<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClipPilot Token Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --border:#e7e9f0;
  --text:#1e2233;
  --muted:#8a8fa3;
  --accent:#4f46e5;
  --accent-dark:#4338ca;
  --accent-soft:#eef0fe;
  --green:#16a34a;
  --green-soft:#ecfdf3;
  --red:#dc2626;
  --red-soft:#fef2f2;
  --shadow:0 1px 2px rgba(20,20,43,.04),0 6px 20px rgba(20,20,43,.06);
}
body{font-family:'Inter',Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}

/* ---------- Sidebar ---------- */
.sidebar{width:300px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:22px 20px 14px}
.sidebar-header h1{font-size:1.2rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:9px;letter-spacing:-.02em}
.sidebar-header .badge{display:inline-block;background:var(--accent);color:#fff;border-radius:8px;width:30px;height:30px;line-height:30px;text-align:center;font-size:1rem}
.sidebar-header .sub{font-size:.76rem;color:var(--muted);margin-top:5px;margin-left:39px}
.sidebar-search{padding:6px 20px 14px}
.sidebar-search input{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.85rem}
.sidebar-search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.add-gmail-btn{margin:0 20px 14px;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:9px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.15s}
.add-gmail-btn:hover{background:var(--accent-dark)}
.gmail-list{flex:1;overflow-y:auto;padding:0 12px 10px}
.gmail-item{padding:11px 12px;border-radius:9px;cursor:pointer;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:.12s}
.gmail-item:hover{background:var(--bg)}
.gmail-item.active{background:var(--accent-soft);box-shadow:inset 0 0 0 1px #c7cbfa}
.gmail-item .name{font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.gmail-item .del-x{opacity:0;font-size:.78rem;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 4px;flex-shrink:0;border-radius:5px}
.gmail-item .del-x:hover{color:var(--red);background:var(--red-soft)}
.gmail-item:hover .del-x{opacity:1}
.empty-sidebar{padding:26px 18px;color:var(--muted);font-size:.82rem;text-align:center;line-height:1.5}

.sidebar-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.user-email{font-size:.78rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:600}
.logout-btn:hover{color:var(--red)}

/* ---------- Main ---------- */
.main{flex:1;overflow-y:auto;padding:30px 40px}
.main-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;color:var(--muted);text-align:center}
.main-empty .icon{font-size:56px;margin-bottom:16px}

.main-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;flex-wrap:wrap;gap:12px}
.main-header h2{font-size:1.4rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px;letter-spacing:-.01em}
.main-header .created{font-size:.78rem;color:var(--muted);margin-top:5px}
.header-actions{display:flex;gap:10px}
.btn{padding:10px 18px;border:none;border-radius:9px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}

.toolbar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:220px;padding:10px 13px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.87rem}
.toolbar input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

.table-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:.87rem}
th{background:#fafbfd;color:var(--muted);padding:13px 16px;text-align:left;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.token-cell{font-size:.72rem;color:#0f766e;word-break:break-all;max-width:260px;font-family:'SF Mono',Consolas,monospace;background:#f0fdfa;padding:6px 8px;border-radius:6px}
.copy-btn{padding:7px 13px;border:none;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:600;background:var(--accent);color:#fff;transition:.15s}
.copy-btn:hover{background:var(--accent-dark)}
.copy-btn.copied{background:var(--green)}
.del-btn{padding:7px 11px;border:none;border-radius:7px;cursor:pointer;font-size:.78rem;background:var(--red-soft);color:var(--red);margin-left:6px;font-weight:600}
.del-btn:hover{background:#fde2e2}
.empty-table{text-align:center;padding:46px;color:var(--muted)}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(30,34,51,.35);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 30px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(20,20,43,.18)}
.modal h3{color:var(--text);margin-bottom:18px;font-size:1.08rem;font-weight:700}
.field{margin-bottom:14px}
.field label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:6px;font-weight:500}
.field input{width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.88rem}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:#fff}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.modal-error{color:var(--red);font-size:.8rem;margin-top:8px;display:none;background:var(--red-soft);padding:9px 12px;border-radius:8px}
.status-line{font-size:.82rem;color:var(--accent);margin-top:12px;display:none;background:var(--accent-soft);padding:9px 12px;border-radius:8px}

/* ---------- Toast ---------- */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:13px 20px;border-radius:10px;font-size:.85rem;box-shadow:0 10px 30px rgba(0,0,0,.2);display:none;z-index:60;font-weight:500}
.toast.show{display:block}

/* ---------- Auth screen ---------- */
.auth-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#f6f7fb 0%,#eef0fe 100%)}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 38px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(20,20,43,.1)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.auth-logo .badge{background:var(--accent);color:#fff;border-radius:10px;width:38px;height:38px;line-height:38px;text-align:center;font-size:1.2rem}
.auth-logo h1{font-size:1.3rem;font-weight:800;letter-spacing:-.02em}
.auth-card .tagline{color:var(--muted);font-size:.85rem;margin-bottom:26px}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:22px}
.auth-tab{flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--muted)}
.auth-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.auth-submit{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:9px;cursor:pointer;font-size:.9rem;font-weight:700;margin-top:6px;transition:.15s}
.auth-submit:hover{background:var(--accent-dark)}
.auth-submit:disabled{opacity:.6;cursor:default}
</style>
</head>
<body>

<!-- Auth screen -->
<div class="auth-wrap" id="authScreen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo"><span class="badge">🎬</span><h1>ClipPilot</h1></div>
    <p class="tagline">Sign in to manage your YouTube tokens privately.</p>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Log In</div>
      <div class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')">Create Account</div>
    </div>
    <div class="field"><label>Email</label><input type="email" id="auth_email" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="auth_password" placeholder="••••••••"/></div>
    <p class="modal-error" id="auth_error"></p>
    <button class="auth-submit" id="auth_submitBtn" onclick="submitAuth()">Log In</button>
  </div>
</div>

<!-- Dashboard -->
<div class="app" id="dashboard" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span class="badge">🎬</span>ClipPilot</h1>
      <div class="sub">Token Management System</div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="gmailSearch" placeholder="🔍 Search Gmail..." oninput="renderGmailList()"/>
    </div>
    <button class="add-gmail-btn" onclick="openAddGmailModal()">+ Add Gmail</button>
    <div class="gmail-list" id="gmailList"></div>
    <div class="sidebar-footer">
      <span class="user-email" id="userEmailLabel"></span>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="main" id="main">
    <div class="main-empty">
      <div class="icon">📭</div>
      <p>Select a Gmail account on the left,<br/>or add a new one to get started.</p>
    </div>
  </div>
</div>

<!-- Add Gmail Modal -->
<div class="overlay" id="addGmailOverlay">
  <div class="modal">
    <h3>➕ Add Gmail Account</h3>
    <div class="field"><label>Gmail Address</label><input type="email" id="ag_gmail" placeholder="you@gmail.com"/></div>
    <div class="field"><label>Client ID</label><input type="text" id="ag_clientId" placeholder="Google OAuth Client ID"/></div>
    <div class="field"><label>Client Secret</label><input type="password" id="ag_clientSecret" placeholder="Client Secret"/></div>
    <p class="modal-error" id="ag_error"></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('addGmailOverlay')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddGmail()">Save</button>
    </div>
  </div>
</div>

<!-- Generate Token Modal -->
<div class="overlay" id="genTokenOverlay">
  <div class="modal">
    <h3>🔑 Generate New Token</h3>
    <div class="field"><label>Channel Handle</label><input type="text" id="gt_channel" placeholder="@channelname"/></div>
    <p class="modal-error" id="gt_error"></p>
    <p class="status-line" id="gt_status">Waiting for Google login in the new tab...</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('genTokenOverlay')">Cancel</button>
      <button class="btn btn-primary" id="gt_submitBtn" onclick="submitGenerateToken()">Generate Token</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let gmails = [];
let selectedGmail = null;
let channelSearchTerm = '';
let pollTimer = null;
let authMode = 'login';

async function api(path, opts) {
  opts = opts || {};
  opts.credentials = 'same-origin';
  const res = await fetch(path, opts);
  let data = {};
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  document.getElementById('ag_error').style.display = 'none';
  document.getElementById('gt_error').style.display = 'none';
  document.getElementById('gt_status').style.display = 'none';
  document.getElementById('gt_submitBtn').disabled = false;
  document.getElementById('gt_submitBtn').textContent = 'Generate Token';
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

/* ---------------- Auth ---------------- */

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('auth_submitBtn').textContent = mode === 'login' ? 'Log In' : 'Create Account';
  document.getElementById('auth_error').style.display = 'none';
}

async function submitAuth() {
  const email = document.getElementById('auth_email').value.trim();
  const password = document.getElementById('auth_password').value;
  const errEl = document.getElementById('auth_error');
  const btn = document.getElementById('auth_submitBtn');
  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = 'Email and password are required.';
    errEl.style.display = 'block';
    return;
  }
  btn.disabled = true;
  try {
    const data = await api(authMode === 'login' ? '/auth/login' : '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    document.getElementById('userEmailLabel').textContent = data.email;
    showAuthed();
    await loadGmails();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
  }
}

async function logout() {
  await api('/auth/logout', { method: 'POST' });
  location.reload();
}

function showAuthed() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
}
function showAuthScreen() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}

async function init() {
  try {
    const me = await api('/auth/me');
    document.getElementById('userEmailLabel').textContent = me.email;
    showAuthed();
    await loadGmails();
  } catch (e) {
    showAuthScreen();
  }
}

/* ---------------- Gmail sidebar ---------------- */

async function loadGmails() {
  gmails = await api('/gmail');
  renderGmailList();
}

function renderGmailList() {
  const term = document.getElementById('gmailSearch').value.trim().toLowerCase();
  const list = document.getElementById('gmailList');
  const filtered = gmails.filter(g => g.gmail.toLowerCase().includes(term));
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-sidebar">No Gmail accounts yet.<br/>Click "Add Gmail" to begin.</div>';
    return;
  }
  list.innerHTML = filtered.map(g => `
    <div class="gmail-item ${selectedGmail && selectedGmail.id === g.id ? 'active' : ''}" onclick="selectGmail(${g.id})">
      <span class="name">📧 ${escapeHtml(g.gmail)}</span>
      <button class="del-x" title="Delete account" onclick="event.stopPropagation();deleteGmail(${g.id})">🗑</button>
    </div>
  `).join('');
}

async function selectGmail(id) {
  selectedGmail = await api('/gmail/' + id);
  channelSearchTerm = '';
  renderGmailList();
  renderMain();
}

async function deleteGmail(id) {
  if (!confirm('Delete this Gmail account and all its channel tokens?')) return;
  await api('/gmail/' + id, { method: 'DELETE' });
  if (selectedGmail && selectedGmail.id === id) selectedGmail = null;
  await loadGmails();
  renderMain();
}

/* ---------------- Main panel ---------------- */

function renderMain() {
  const main = document.getElementById('main');
  if (!selectedGmail) {
    main.innerHTML = `<div class="main-empty"><div class="icon">📭</div><p>Select a Gmail account on the left,<br/>or add a new one to get started.</p></div>`;
    return;
  }
  main.innerHTML = `
    <div class="main-header">
      <div>
        <h2>📧 ${escapeHtml(selectedGmail.gmail)}</h2>
        <div class="created">Added ${formatDate(selectedGmail.created_at)}</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openGenerateModal()">🔑 Generate New Token</button>
      </div>
    </div>
    <div class="toolbar">
      <input type="text" id="channelSearch" placeholder="🔍 Search channels..." oninput="onChannelSearch(this.value)"/>
    </div>
    <div class="table-card">
      <table>
        <thead><tr><th>Channel</th><th>Refresh Token</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody id="channelTbl"></tbody>
      </table>
    </div>
  `;
  document.getElementById('channelSearch').value = channelSearchTerm;
  renderChannelTable(selectedGmail.channels);
}

function onChannelSearch(value) {
  channelSearchTerm = value;
  const term = value.trim().toLowerCase();
  const filtered = selectedGmail.channels.filter(c => c.channel_handler.toLowerCase().includes(term));
  renderChannelTable(filtered);
}

function renderChannelTable(channels) {
  const tbl = document.getElementById('channelTbl');
  if (!tbl) return;
  if (!channels.length) {
    tbl.innerHTML = '<tr><td colspan="4"><div class="empty-table">No channels yet. Click "Generate New Token" to add one.</div></td></tr>';
    return;
  }
  tbl.innerHTML = channels.map(c => `
    <tr>
      <td><b>${escapeHtml(c.channel_handler)}</b></td>
      <td><span class="token-cell" id="token-${c.id}">${escapeHtml(c.refresh_token)}</span></td>
      <td style="color:var(--muted);font-size:.8rem">${formatDate(c.created_at)}</td>
      <td>
        <button class="copy-btn" id="copybtn-${c.id}" onclick="copyToken(${c.id})">📋 Copy</button>
        <button class="del-btn" onclick="deleteChannel(${c.id})">🗑</button>
      </td>
    </tr>
  `).join('');
}

function copyToken(id) {
  const tokenEl = document.getElementById('token-' + id);
  const text = tokenEl.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copybtn-' + id);
    const original = btn.textContent;
    btn.textContent = '✅ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1500);
  }).catch(() => showToast('Could not copy. Please copy manually.'));
}

async function deleteChannel(id) {
  if (!confirm('Delete this channel token?')) return;
  await api('/channel/' + id, { method: 'DELETE' });
  selectedGmail = await api('/gmail/' + selectedGmail.id);
  onChannelSearch(channelSearchTerm);
}

/* ---------------- Add Gmail flow ---------------- */

function openAddGmailModal() {
  document.getElementById('ag_gmail').value = '';
  document.getElementById('ag_clientId').value = '';
  document.getElementById('ag_clientSecret').value = '';
  openModal('addGmailOverlay');
}

async function submitAddGmail() {
  const gmail = document.getElementById('ag_gmail').value.trim();
  const client_id = document.getElementById('ag_clientId').value.trim();
  const client_secret = document.getElementById('ag_clientSecret').value.trim();
  const errEl = document.getElementById('ag_error');
  errEl.style.display = 'none';
  if (!gmail || !client_id || !client_secret) {
    errEl.textContent = 'All fields are required.';
    errEl.style.display = 'block';
    return;
  }
  try {
    await api('/gmail', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ gmail, client_id, client_secret })
    });
    closeModal('addGmailOverlay');
    await loadGmails();
    showToast('Gmail account saved!');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
}

/* ---------------- Generate Token flow ---------------- */

function openGenerateModal() {
  document.getElementById('gt_channel').value = '';
  openModal('genTokenOverlay');
}

async function submitGenerateToken() {
  const channel_handler = document.getElementById('gt_channel').value.trim();
  const errEl = document.getElementById('gt_error');
  const statusEl = document.getElementById('gt_status');
  const btn = document.getElementById('gt_submitBtn');
  errEl.style.display = 'none';
  if (!channel_handler) {
    errEl.textContent = 'Please enter a channel handle.';
    errEl.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Generating...';
  try {
    const data = await api('/channel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ gmail_id: selectedGmail.id, channel_handler })
    });
    window.open(data.authUrl, '_blank');
    statusEl.style.display = 'block';

    pollTimer = setInterval(async () => {
      try {
        const s = await api('/token-status?state=' + data.state);
        if (s.done) {
          clearInterval(pollTimer); pollTimer = null;
          closeModal('genTokenOverlay');
          selectedGmail = await api('/gmail/' + selectedGmail.id);
          await loadGmails();
          renderMain();
          showToast('Token generated for ' + channel_handler + '!');
        } else if (s.error) {
          clearInterval(pollTimer); pollTimer = null;
          errEl.textContent = s.error;
          errEl.style.display = 'block';
          statusEl.style.display = 'none';
          btn.disabled = false;
          btn.textContent = 'Generate Token';
        }
      } catch (e) {}
    }, 2000);

    setTimeout(() => {
      if (pollTimer) {
        clearInterval(pollTimer); pollTimer = null;
        statusEl.style.display = 'none';
        btn.disabled = false;
        btn.textContent = 'Generate Token';
      }
    }, 180000);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Generate Token';
  }
}

/* ---------------- Utils ---------------- */

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  if (isNaN(d.getTime())) return str;
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

init();
</script>
